      {
        "@type": "Question",
        "name": "¿Cómo funciona el alquiler de sets de construcción en Brickshare?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "El proceso es sencillo: 1) Elige un plan de suscripción (desde 19,90€/mes). 2) Explora el catálogo y añade sets a tu wishlist. 3) Brickshare te envía un set en 2-3 días laborables. 4) Disfrútalo sin límite de tiempo. 5) Cuando quieras cambiarlo, solicita la devolución desde la web. 6) Brickshare lo recoge, higieniza y te envía el siguiente. Los intercambios son ilimitados."
        }
      },
      {
        "@type": "Question",
        "name": "¿Cuánto cuesta alquilar sets de LEGO en Brickshare?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Brickshare ofrece tres planes: Brick Starter (19,90€/mes, sets de 100-300 piezas, 5-7 años), Brick Pro (29,90€/mes, sets de 300-550 piezas, 8-11 años) y Brick Master (39,90€/mes, sets de 550-800 piezas, 12-15 años). Cada intercambio de set tiene un coste logístico adicional de 10€."
        }
      },
      {
        "@type": "Question",
        "name": "¿Cuántos sets puedo tener a la vez con Brickshare?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Con cada suscripción puedes tener 1 set a la vez. Cuando lo devuelves, Brickshare te envía el siguiente de tu lista de deseos (wishlist). Los intercambios son ilimitados."
        }
      },
      {
        "@type": "Question",
        "name": "¿Puedo cancelar la suscripción de Brickshare cuando quiera?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. La suscripción se puede cancelar en cualquier momento. El período mínimo es de 1 mes."
        }
      },
      {
        "@type": "Question",
        "name": "¿Qué pasa si pierdo piezas del set?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Las piezas pequeñas comunes no se cobran. Sin embargo, las figuras originales (minifiguras) y piezas exclusivas tienen coste si faltan, descontándose de la fianza del envío. La fianza se devuelve automáticamente cuando Brickshare recibe y valida el set."
        }
      },
      {
        "@type": "Question",
        "name": "¿Los sets de construcción de Brickshare están higienizados?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. Todos los sets pasan por un riguroso proceso de higienización antes de llegar a cada hogar: limpieza profunda con productos seguros para niños, revisión pieza a pieza, reposición de piezas faltantes o dañadas, y empaquetado higiénico. Los sets cumplen con todas las normativas europeas de seguridad para juguetes (marcado CE)."
        }
      },
      {
        "@type": "Question",
        "name": "¿Brickshare tiene impacto social?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. Todo el proceso de higienización, control de calidad, revisión de piezas y preparación de envíos es realizado por personas con discapacidad, en colaboración con centros especiales de empleo. Al suscribirte a Brickshare contribuyes activamente a la inclusión laboral."
        }
      },
      {
        "@type": "Question",
        "name": "¿Es Brickshare sostenible?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sí. Brickshare aplica los principios de la economía circular al sector del juguete. Cada set se reutiliza decenas o cientos de veces, reduciendo la producción innecesaria de plástico, el desperdicio de recursos y la huella de carbono. Es una alternativa sostenible a comprar juguetes nuevos que se usan poco."
        }
      },

        "@type": "Question",
        "name": "¿Dónde está disponible el servicio de Brickshare?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Brickshare está disponible en toda España peninsular. Se prevé expansión a Portugal, Francia e Italia."
        }
      }
