  /accounts/{accountId}/requests/{requestId}/cancel:
    post:
      summary: Cancel a request
      description: >
        This will cancel all in progress **Operations** (deposit, noShow, payment) for a **Request**.
        Additionally, any associated **Reclaims** in **Scheduled** status will be automatically deleted once their associated **Operation** has been **Canceled**.

        A request cannot be canceled if it has already been secured by the end-user. In this case, you must release the request.
        You can check if a request can be canceled by checking the `cancelable` field in the request object.
        <br><br>
        Caution - you CANNOT cancel a request if it has already been secured by the end-user. In this case, you must [release the request](#post-/accounts/-accountId-/requests/-requestId-/release).
      tags:
        - requests
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: requestId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      responses:
        '200':
          description: The updated request. The `cancelable` field will be set to false. If the request was already canceled or expired, a 200 response will be returned.
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: '#/components/schemas/Request'

  /accounts/{accountId}/requests/{requestId}/release:
    post:
      summary: Release a request
      description: This will release all releasable in progress **Operations** (deposit, noShow) for a **Request**.
        You can check if a request can be released by checking the `releasable` field in the request object.
        <br><br>
        Caution - you CANNOT release a request if it has NOT already been secured by the end-user. In this case, you must [cancel the request](#post-/accounts/-accountId-/requests/-requestId-/cancel).
      tags:
        - requests
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: requestId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      responses:
        '200':
          description: The updated request
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: '#/components/schemas/Request'

