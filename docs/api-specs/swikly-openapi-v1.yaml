      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                link:
                  type: string
                  format: uri
      responses:
        '200':
          description: The created short link
          content:
            application/json:
              schema:
                type: object
                properties:
                  shortLink:
                    $ref: '#/components/schemas/ShortLink'

components:
  parameters:
    page:
      in: query
      name: page
      required: false
      schema:
        $ref: '#/components/schemas/ResultsPage'
    perPage:
      in: query
      name: per_page
      description: The number of entities per page
      required: false
      schema:
        $ref: '#/components/schemas/ResultsPerPage'

  schemas:
    Id:
      type: string
      format: uuid
      examples: [ E67F8379-EACF-4CB8-B6FD-1D0046DE3E1F ]
    Amount:
      type: integer
      minimum: 1
      description: Amount in cents
      examples: [ 2500 ]

    Currency:
      type: string
      description: ISO 4217 Currency code
      examples: [ EUR ]

    Date:
      type: string
      format: date
      examples: [ "2023-06-19" ]

    DateOrNull:
      type: [ 'string', 'null' ]
      format: date
      examples: [ "2023-06-19" ]

    DateTime:
      type: string
      format: date-time
      description: ISO 8601 formatted date
      examples: [ "2023-06-19T13:10:09.433000Z" ]

    DateTimeOrNull:
      type: [ 'string', 'null' ]
      format: date-time
      description: ISO 8601 formatted date
      examples: [ "2023-06-19T13:10:09.433000Z" ]

    User:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Id'
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        createdAt:
          $ref: '#/components/schemas/DateTime'
      examples:
        - id: "F705FE79-E397-4623-A874-905F908ABC76"
          firstName: "Yorgos"
          lastName: "Kubrick"
          email: "yorgos.kubrick@foobar.edu"
          createdAt: "2022-08-26T12:58:23.835+00:00"

    Account:
      type: object
      required:
        - id
        - commercialName
        - currency
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Id'
        legacyId:
          type: [ 'string', 'null' ]
          format: uuid
          description: The V1 legacy Id. If not null, the account is a V1 account that have been migrated to V2.
          readonly: true
          default: null
        commercialName:
          type: string
          description: The displayed name of the account.
        managerId:
          type: [ 'string', 'null' ]
          format: uuid
          description: If not null, the account is managed by another account.
          readonly: true
          default: null
        reference:
          type: [ 'string', 'null' ]
          description: Any custom reference for the account.
        currency:
          allOf:
            - $ref: '#/components/schemas/Currency'
            - description: The currency of the account
              readonly: true
        createdAt:
          $ref: '#/components/schemas/DateTime'
        secret:
          type: string
          description: The secret string used to sign Permalinks and Callbacks. The authenticated user must have the permission to see it.
          readonly: true
      examples:
        - id: "439b21c5-1ca6-4363-a459-cbf8be860152"
          legacyId: null
          commercialName: "My account"
          managerId: "391c84f6-ca6e-4d43-ab61-3243773cd573"
          reference: null
          currency: "EUR"
          createdAt: "2022-08-26T12:58:23.835+00:00"
          secret: "lksdfhlfdhgjfdklg"

    Request:
      type: object
      required:
        - id
        - accountId
        - link
        - description
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Id'
        accountId:
          $ref: '#/components/schemas/Id'
        legacyId:
          type: [ 'string', 'null' ]
          format: uuid
          description: The V1 legacy Id. If not null, the request has been created on the "old" Swikly platform and there are **readonly through this API**. All `summaries` will be empty as well.
          readonly: true
          default: null
        customId:
          type: [ 'string', 'null' ]
          description: The custom id associated with the request it that will be displayed in the dashboard
          examples: [ "customid12345" ]
        customIdMustBeUnique:
          type: boolean
          description: When set to true, ensures the customId is unique across all requests. If false or omitted, duplicated customIds are allowed. As soon as a customId is registered as unique, no request can be registered with this same customId, even if this parameter is not provided or set to false.
          examples: [ true ]
        skipToPaymentPageIfPossible:
          type: boolean
          description: When set to true and if all required end user's personal information are set, the end user will be displayed the Bank Card form directly when accessing the checkout. Required fields are `firstName`, `lastName`, `email`, `phoneNumber`. For some accounts, `birthDate` and `address` are required as well.
          examples: [ false ]
        lastName:
          type: [ 'string', 'null' ]
          description: Last name of the end-user
          examples: [ John ]
        firstName:
          type: [ 'string', 'null' ]
          description: First name of the end-user
          examples: [ Doe ]
        email:
          type: [ 'string', 'null' ]
          format: email
          description: Email of the end-user
          examples: [ john@doe.com ]
        phoneNumber:
          type: [ 'string', 'null' ]
          description: Phone number of the end-user, must contain the country code (ie:+33...)
          examples: [ "+3312344567" ]
        description:
          type: string
          description: Description of the request displayed to the end-user explain the reason of it
          examples: [ Summer rental security deposit ]
        freeText:
          type: [ 'string', 'null' ]
          description: Free text returned in the request, never displayed anywhere, for technical purpose
          examples:
            - any text
        releasable:
          type: boolean
          description: Indicate if it is possible to release all the linked operations.
            A deposit can be release if it has been secured and has not expired yet.
            A no-show can be release if it has been secured and has not expired yet.
            A payment cannot be released.
          readOnly: true
        cancelable:
          type: boolean
          description: Indicate if it is possible to cancel all the linked operations.
            A deposit can be canceled if it has not been secured.
            A no-show can be canceled if it has not been secured.
            A payment can be canceled if it has not been paid.
          readOnly: true
        deposit:
          oneOf:
            - $ref: '#/components/schemas/Deposit'
            - type: 'null'
        noShow:
          oneOf:
            - $ref: '#/components/schemas/NoShow'
            - type: 'null'
        payment:
          oneOf:
            - $ref: '#/components/schemas/Payment'
            - type: 'null'
        endUser:
          oneOf:
            - allOf:
              - $ref: '#/components/schemas/Person'
              - description: The data the end user entered during the checkout
            - type: object
              properties:
                address:
                  $ref: '#/components/schemas/BaseAddress'
              description: The address that may be entered during the request creation, as long as the end user has not completed the checkout.
            - type: 'null'
        link:
          type: 'string'
          format: uri
          description: The checkout url
          examples: [ https://v2.swik.link/xHbUtRi ]
          readOnly: true
        redirectUrl:
          $ref: '#/components/schemas/RedirectUrl'
        returnUrl:
          $ref: '#/components/schemas/ReturnUrl'
        createdAt:
          allOf:
            - $ref: '#/components/schemas/DateTime'
            - description: Request creation Date.
            - readOnly: true

    Deposit:
      type: object
      required:
        - id
        - requestId
        - amount
        - amountToBeSecured
        - securedAmount
        - status
        - startDate
        - endDate
        - expirationDate
        - acceptedAt
        - releasedAt
        - canceledAt
        - createdAt
      properties:
        id:
          $ref: '#/components/schemas/Id'
        requestId:
          $ref: '#/components/schemas/Id'
        request:
          oneOf:
            - $ref: '#/components/schemas/Request'
            - type: 'null'
        amount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - description: Amount in cents of the security deposit.
        amountToBeSecured:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - description: Amount in cents of the security deposit not secured yet. Equals the amount of the security deposit when not secured yet. Equals 0 when secured.
            - readOnly: true
        securedAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - description: Amount in cents of the security deposit that has been secured. Equals 0 when security deposit is not secured yet. Equal amount when secured.
            - readOnly: true
        status:
          type: string
          enum:
            - Pending
            - Temporary
            - Canceled
            - Initialized
            - Accepted
            - Failed
            - Released
            - Expired
            - ExpiredWithoutAcceptance
          description: Status of the security deposit.
        startDate:
          allOf:
            - $ref: '#/components/schemas/Date'
            - description: Start date of the deposit
        endDate:
          allOf:
            - $ref: '#/components/schemas/Date'
            - description: End date of the deposit, the deposit will expire if it is not secured within 24 hours after this date.
        expirationDate:
          allOf:
            - $ref: '#/components/schemas/Date'
            - description: Date of expiration of the security deposit, an expired no-show cannot be reclaimed
            - readOnly: true
        reclaimSummary:
          allOf:
            - $ref: '#/components/schemas/ReclaimSummary'
            - readOnly: true
              description: A summary of all reclaim actions. Will be empty if legacyId is not null.
        refundSummary:
          allOf:
            - $ref: '#/components/schemas/RefundSummary'
            - readOnly: true
              description: A summary of all refunds actions. Will be empty if legacyId is not null.
        acceptedAt:
          allOf:
            - $ref: '#/components/schemas/DateTimeOrNull'
            - description: Date at which the end-user has secured the security deposit.
            - readOnly: true
        releasedAt:
          allOf:
            - $ref: '#/components/schemas/DateTimeOrNull'
            - description: Date at which the security deposit has been released.
            - readOnly: true
        canceledAt:
          allOf:
            - $ref: '#/components/schemas/DateTimeOrNull'
            - description: Date at which the security deposit has been canceled.
            - readOnly: true
        createdAt:
          allOf:
            - $ref: '#/components/schemas/DateTime'
            - description: Date at which the security deposit has been created.
            - readOnly: true
      examples:
        - id: "A833478F-08B4-475A-8C5D-964DE474CA85"
          requestId: "CF85309F-2557-4140-817D-E429B3F8E5D6"
          amount: 50000
          status: "Accepted"
          startDate: "2024-11-04"
          endDate: "2024-11-10"
          expirationDate: "2024-12-10"
          reclaimSummary:
            reclaimableAmount: 15000
            scheduledRequestedAmount: 0
            maximumReclaimCreationDate: "2024-11-04"
            pendingRequestedAmount: 25000
            pendingReclaimedAmount: 20000
            reclaimedAmount: 10000
