  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Your `API token` (see [documentation](#overview--authentication--api-key))

        Instruction for manual calls:

security:
  - BearerAuth: [ ]

tags:
  - name: users
    description: |
      User related informations

  - name: accounts
    description: |
      Accounts and sub accounts are the main entities in Swikly. They are used to manage your business. A user can have access to many accounts.

  - name: requests
    description: |
      Requests are the entities that hold operations such as deposits, no-shows and payments
      They can be created directly from the app, via a permalink, or via this API

  - name: deposits
    description: |
      Deposits are operations used to request security deposits

  - name: no-shows
    description: |
      NoShows are operations used to secure a reservation, a training course or an event

  - name: payments
    description: |
      Payments are operations used to request a payment

  - name: reclaims
    description: |
      A reclaim is used to collect funds secured by a deposit or a no-show. This typically occurs if damage is discovered and covered by a security deposit, or if someone fails to appear for an appointment for which a no-show deposit was collected.

      A reclaim request will initiate the mitigation process between the business requesting to cash-in the deposit or down payment, Swikly and the end-user.

      A swik can be reclaimed once the initial transaction has been accepted by the end-user, as long as the amount reclaimed is not higher than the amount of the swik and if the swik has not yet expired.

      **Reclaims are not available for payments.**

      To complete your reclaim request, [you must provide the following supporting documents](#post-/accounts/-accountId-/reclaims/-reclaimId-/files) immediately after creating your swik reclaim.

  - name: refunds
    description: |
      A refund is used to partially or fully return funds previously collected, either because too much was collected via a reclaim or to reimburse a payment.
      The refunded amount is transferred back to the original payment method used by the end user.

  - name: short-links
    description: |
      Short links can be used to shorten any swikly link
