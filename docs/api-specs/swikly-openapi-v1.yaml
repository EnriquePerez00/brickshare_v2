    # User agent

    When using our API, you must configure your HTTP client's [User Agent](https://en.wikipedia.org/wiki/User-Agent_header) header to match your company or project name.
    It will be much easier for us to help you debug your API calls if we can find them using this value.

    Example: Instead of the default values `Apache-HttpClient/4.5.14 (Java/21.0.2)` or `Guzzle/7.3 curl/7.21.4 PHP/8.3.1`, you should use `YourProjectName/1`.

    # Authentication & API key

    An `API key` is required to access any API endpoint. You can manage your own API keys in [your Swikly user account](https://app.v2.swikly.com/me/api-keys/).

    > Tokens are dedicated to a user and a specific environment. If you want to use the `sandbox` environment, please create an account on the [sandbox app](https://app.sandbox.swikly.com/) and get your API key in [your sandbox account](https://app.sandbox.swikly.com/me/api-keys/).

    > **Caution:** the `API key` is linked to a user and not to an account. It allows to access and modify data based on the related user's permissions.

    > If you have a **legacy (V1)** credentials couple (`api_key` and `api_secret`), you can pass them with format `api_key:api_secret`, or you can still use both `API_KEY` and `API_SECRET` headers.

paths:
  /me:
    get:
      summary: Retrieve current user informations
      tags:
        - users
      responses:
        '200':
          description: The currently authenticated user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
  /accounts:
    get:
      summary: List accounts
      tags:
        - accounts
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: The accounts the current user has access to
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
                  meta:
                    $ref: '#/components/schemas/ResultsMeta'

  /accounts/{accountId}/requests:
    get:
      summary: List Requests
      tags:
        - requests
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - in: query
          name: with
          description: load additional relationships, comma separated values
          required: false
          style: simple
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [ 'endUser', 'deposit', 'noShow', 'payment' ]
        - in: query
          name: search
          description: |
            Filter requests using either:
            - A `customId` provided at the creation of the `request`
            - The `request` | `deposit` | `no-show` | `payment` Id or its first 5 or 6 characters
          required: false
          style: simple
          # If fill-request-fields-with-example=true, the first example will be used, and we do not want it
          x-fill-example: no
          schema:
            type: string
            examples:
              requestIdPrefix:
                value: "A12345"
                description: "First 5 or 6 characters of the request Id"
              customRequestId:
                value: "my-custom-id"
                description: "`customId` set during the request creation"
        - in: query
          name: include_legacy
          description: If true, requests created on the legacy V1 app will be returned as well. They will be readonly on this app.
          required: false
          style: simple
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: The account Requests
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/Request'
                  meta:
                    $ref: '#/components/schemas/ResultsMeta'
    post:
      summary: Create a Request
      description: Create a new **Request** by defining the **Operations** values and the **End-User** information.
        Also defines the checkout behavior when **Request** lifecycle is updated. ie, callbacks, redirectURL...
      tags:
        - requests
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
                - language
              properties:
                description:
                  type: string
                language:
                  type: string
                  enum: [ fr, en, es, it, nl, de ]
                  description: Language used for communication with the end user.
                customId:
                  allOf:
                    - $ref: '#/components/schemas/Request/properties/customId'
                    - description: Any custom ID you want to associate with the request.
                customIdMustBeUnique:
                  $ref: '#/components/schemas/Request/properties/customIdMustBeUnique'
                skipToPaymentPageIfPossible:
                  $ref: '#/components/schemas/Request/properties/skipToPaymentPageIfPossible'
                freeText:
                  $ref: '#/components/schemas/Request/properties/freeText'
                firstName:
                  $ref: '#/components/schemas/Request/properties/firstName'
                lastName:
                  $ref: '#/components/schemas/Request/properties/lastName'
                email:
                  $ref: '#/components/schemas/Request/properties/email'
                phoneNumber:
                  $ref: '#/components/schemas/Request/properties/phoneNumber'
                birthDate:
                  allOf:
                    - $ref: '#/components/schemas/Date'
                    - description: The birth date of the end user
                startDate:
                  allOf:
                    - $ref: '#/components/schemas/Date'
                    - description: "[deprecated] Use the Operation object."
                endDate:
                  allOf:
                    - $ref: '#/components/schemas/Date'
                    - description: "[deprecated] Use the Operation object."
                callbackUrl:
                  type: [ 'string', 'null' ]
                  format: uri
                  description: "[deprecated] Use 'callbacks' object instead. Once the request is secured, an `application/x-www.form-urlencoded` HTTP POST request will be sent to this URL. See https://github.com/swikly/swikly-link/wiki/6.-Callback-URL-and-Redirect-URL-parameters"
                  examples: [ https://myserver.com/send/callback/here ]
                redirectUrl:
                  $ref: '#/components/schemas/RedirectUrl'
                returnUrl:
                  $ref: '#/components/schemas/ReturnUrl'
                sendEmail:
                  description: Send an email to notify the end user of your request.
                  type: boolean
                  default: true
                sendSms:
                  description: Send an sms to notify the end user of your request.
                  type: boolean
                  default: true
                partnerTag:
                  type: [ 'string', 'null' ]
                  description: An authorized partner tag you want to associate with the request.
                    If a partner tag is provided, no automatic reminder notifications will be sent to the end user.
                  example: null
                callbacks:
                  type: object
                  properties:
                    requestSecured:
                      $ref: '#/components/schemas/RequestSecuredCallback'
                    allPendingReclaimsCompleted:
                      $ref: '#/components/schemas/ReclaimFinishedCallback'
                    allPendingRefundsCompleted:
                      $ref: '#/components/schemas/RefundFinishedCallback'
                deposit:
                  type: object
                  required: [ startDate, endDate, amount ]
                  properties:
                    startDate:
                      $ref: '#/components/schemas/Date'
                    endDate:
                      $ref: '#/components/schemas/Date'
                    amount:
                      $ref: '#/components/schemas/Amount'
                noShow:
                  type: object
                  required: [ date, amount ]
                  properties:
                    date:
                      $ref: '#/components/schemas/Date'
                    amount:
                      $ref: '#/components/schemas/Amount'
                payment:
                  type: object
                  required: [ amount ]
                  properties:
                    dueDate:
                      $ref: '#/components/schemas/Date'
                    amount:
                      $ref: '#/components/schemas/Amount'
                address:
                  $ref: '#/components/schemas/Address'
                depositAmount:
                  allOf:
                    - $ref: '#/components/schemas/Amount'
                    - description: "[deprecated] Use the deposit object. The Deposit amount of the request in cents"
                noShowAmount:
                  allOf:
                    - $ref: '#/components/schemas/Amount'
                    - description: "[deprecated] Use the noShow object. The NoShow amount of the request in cents"
                paymentAmount:
                  allOf:
                    - $ref: '#/components/schemas/Amount'
                    - description: "[deprecated] Use the payment object. The Payment amount of the request in cents"
            examples:
              simpleDepositRequest:
                summary: Request with a deposit only
                description: Example request containing only a deposit, including the end user's first and last name. The "endDate" field MUST be today or later.
                value:
                  description: "My simple deposit request"
                  language: "fr"
                  firstName: "John"
                  lastName: "Doe"
                  deposit:
                    startDate: "2026-06-10"
                    endDate: "2026-06-12"
                    amount: 12000
              simpleNoShowRequest:
                summary: Request with a no-show only
                description: Example request containing only a no-show, including the end user's first and last name. The "date" field MUST be today or later.
                value:
                  description: "My simple no-show request"
                  language: "fr"
                  firstName: "John"
                  lastName: "Doe"
                  noShow:
                    date: "2026-06-15"
                    amount: 9900
              simplePaymentRequest:
                summary: Request with a payment only
                description: Example request containing only a payment with a due date, including the end user's first and last name. The "dueDate" field MUST be today or later.
                value:
                  description: "My simple payment request"
                  language: "fr"
                  firstName: "John"
                  lastName: "Doe"
                  payment:
                    dueDate: "2026-02-20"
                    amount: 39900
              multipleOperationsRequest:
                summary: Request combining a deposit, a no-show, and a payment
                description: Example request containing multiple operations. The deposit "endDate", no-show "date", and payment "dueDate" fields MUST be today or later.
                value:
                  description: "Request combining a deposit, a no-show, and a payment for the same end user."
                  language: "en"
                  firstName: "John"
                  lastName: "Doe"
                  email: "john.doe@fake.email"
                  phoneNumber: "+33695825425"
                  birthDate: "1995-05-26"
                  deposit:
                    startDate: "2026-06-02"
                    endDate: "2026-06-05"
                    amount: 44000
                  noShow:
                    date: "2026-06-15"
                    amount: 9900
                  payment:
                    dueDate: "2026-06-20"
                    amount: 39900
                  address:
                    country: "FR"
                    postalCode: "69002"
