openapi: 3.1.0
servers:
  - description: Production
    url: https://api.v2.swikly.com/v1
  - description: Sandbox
    url: https://api.sandbox.swikly.com/v1

info:
  version: 1.1.0
  title: Swikly API
  description: |
    # Presentation

    ## Available Resources

    ### 1. Account
    - Represents the account of the application.
    - Most endpoints require an account_id in the url, this account_id can be found in Swikly "Applications and integrations" > "Developer" > "Account ID".
      - [Production Developer panel](https://app.v2.swikly.com/applications-integrations/developer/)
      - [Sandbox Developer panel](https://app.sandbox.swikly.com/applications-integrations/developer/)

    <details>
      <summary><strong>Developer panel screenshot</strong></summary>

      ![account_id](openapi/img/account_id_in_swikly.webp)
    </details>

    ### 2. Users
    - Represents the users of the application.

    ### 3. Requests
    - An object that contains all information related to **Operations** (Deposit, No-Show, and Payment), **End-Users**, and **Utilities** (such as checkout URL, creation date, etc.).
    - Used to create and manage **Operations**.

    #### Key Rules:
    - A **Request** must include at least one **Operation**.
    - A **Request** can combine different **Operations** (e.g., a **Deposit** and a **Payment**).
    - A **Request** cannot contain duplicate operations (e.g., two **Deposits** in the same request are not allowed).

    #### Sub-Resources of a Request:
    - **Deposit**:
      - An **Operation** that contains all information related to the deposit.
      - Deposits can be **Reclaimed**.
    - **No-Show**:
      - An **Operation** that contains all information related to no-show penalties.
      - No-Shows can be **Reclaimed**.
    - **Payment**:
      - An **Operation** that contains all information related to payments.
      - Payments can be **Refunded**.
    - **End-User**:
      - Contains all information related to the person securing the **Request**.

    ### 4. Reclaims

    > A reclaim is used to collect funds secured by a deposit or a no-show. This typically occurs if damage is discovered and covered by a security deposit, or if someone fails to appear for an appointment for which a no-show was collected.

    - Contains all information related to the **Reclaim** states of an **Operation**.
    - **Reclaims** are used to cash-in a **Deposit** or a **No-Show**.
    - **Reclaims** can be **Refunded**.
    - You can process and manage a **Reclaim** directly from the **Request**.
    - **Not recommended**: In **Advanced Mode**, you can manage the **Reclaim** resource independently.

    ### 5. Refunds

    > A refund is used to return funds previously collected, either because too much was collected via a reclaim or to reimburse a payment. The refunded amount is transferred back to the original payment method used by the end user.

    - Contains all information related to the **Refund** states of an **Operation**.
    - **Refunds** are used to return funds for a completed **Payment** or **Reclaim**.
    - You can process a **Refund** directly from the **Request**.
    - **Not recommended**: In **Advanced Mode**, you can manage the **Refund** resource independently.

    ## Terminology

    - **Secure a Request**: Refers to the moment the end-user complete the checkout for a Request. Meaning he has filled all of its information and secure the Security Deposit / No-show or paid the Payment.

    # REST API
    The Swikly API is organized around REST. Our API has predictable, resource-oriented URLs, and uses HTTP response codes to indicate API errors.

    ## HTTP Scheme
    All API requests must be made over HTTPS. Calls made over plain HTTP will fail.

    ## Headers
    All API requests must contain an `Accept: application/json` header.

    ## Rate Limiting
    Each user accessing the API has a default limit of 120 requests per minute.

    Rate limiting information will be returned in the response headers:
      - X-RateLimit-Limit: 120
      - X-RateLimit-Remaining: 58

    Reaching the rate limit, will return an error message "Too Many Attempts." with 429 status code.

    Additional headers will be returned once the rate-limit is reached:

      - Retry-After: 37
      - X-RateLimit-Remaining: 1693405224

    Retry-After is the number of seconds before the next limit reset happens.

    X-RateLimit-Remaining is the UNIX timestamp at which the next limit reset happens.

    ## Errors

    ### Here is a list of HTTP status codes with their associated payloads:

    * 400
    ```json
    {
      "code": "ERR_REC_002",
      "message": "The amount requested exceeds the amount available.",
      "context": [],
    }
    ```
    * 401
    ```json
    {
      "message": "Please authenticate to access this resource."
    }
    ```
    * 403
    ```json
    {
      "message": "This action is unauthorized."
    }
    ```
    * 404
    ```json
    {
      "message": "Page not found."
    }
    ```
    * 422
    ```json
    {
      "message": "The callback url is not a valid URL.",
      "code": "ERR_PARAMS",
      "errors": {
        "callbackUrl": [
          "The callback url is not a valid URL."
        ]
      }
    }
    ```
    * 429
    ```json
    {
      "message": "Too Many Attempts."
    }
    ```
    * 500
    ```json
    {
      "message": "Server Error"
    }
    ```

    ## Callbacks & webhooks

    ### Webhook Signatures

    Our app will sign all webhook events sent to your endpoints with a signature. This signature appears in each webhook request's `Swikly-Signature` header.
    It allows you to verify that the events were sent by Swikly rather than a third party.

    Before you can verify signatures, you need to retrieve your account's `secret`. You can find it by calling [`GET /accounts`](#get-/accounts)
    or from your dashboard, in `Applications and integrations > Developer > Link credentials (or Secret)`.

    The `Swikly-Signature` header included in each signed webhook request contains a timestamp and a signature.
    The timestamp is prefixed by t=, and the signature is prefixed by its algorithm name: `sha256` only for now.
    ```
    Swikly-Signature: t=1739352941,sha256=7244dc6a957d9583516a170ff07242499e58e74da34afd732a60f900e8e162e1
    ```

    Swikly generates signatures using a hash-based message authentication code ([HMAC](https://en.wikipedia.org/wiki/Hash-based_message_authentication_code))
    with [SHA-256](https://en.wikipedia.org/wiki/SHA-2). To [prevent downgrade attacks](https://en.wikipedia.org/wiki/Downgrade_attack), ignore all schemes that aren’t the most recently documented one.

    ### Validate Signatures

    **Step 1: Extract the _Timestamp_ and _Signature_ from the Header**

    Split the header using the `,` character as the separator to get a list of elements.
    Then split each element using the `=` character as the separator, to get a prefix and value pair.

    The value for the prefix `t` corresponds to the timestamp and `sha256` corresponds to the signature. You can ignore other elements.

    **Step 2: Prepare the `signed_payload` string**

    The `signed_payload` string is created by concatenating:
    - The timestamp (as a string)
    - The character `.`
    - The actual JSON payload (that is, the request body)

    For example:
    ```
    1739352941.{"event":"requestSecured","request":{...}}
    ```

    > Don't apply any formatting on the request body payload; take it as it is. If you apply formatting, it will add white-space characters that will result in a wrong signature construction.

    **Step 3: Determine the Expected Signature**

    Compute an HMAC with the SHA256 hash function. Use your account’s `secret` as the key, and use the `signed_payload` string as the message.

    **Step 4: Compare the Signatures**

    Compare the signature in the header to the expected signature.
    For an equality match, compute the difference between the current timestamp and the received timestamp,
    then decide if the difference is within your tolerance.

    Examples:

    <details>
      <summary><strong>Node.js</strong></summary>

      ```javascript
      const crypto = require('crypto');

      // Variables you must get by yourself
      const secret = 'YOUR_ACCOUNT_SECRET';
      const requestBody = 'THE_HTTP_REQUEST_RAW_BODY';
      const signatureHeader = "t=1739352941,sha256=f51f716227106db033b792ca240323c77d673b5640ba8588077f939566c676ac";
      // Values you can configure
      const maxAllowedTimestampSeconds = 10*60; // a 10 minutes old timestamp is okay

      // Header parsing
      const headerValues = signatureHeader
        // Split every part
        .split(',')
        // Split key & values
        .map(part => part.split('=').map(y => y.trim()))
        // [key, value] array to object
        .reduce((result, part) => {
        result[part[0]] = part[1];
        return result;
        }, {});

      const signatureTimestamp = headerValues['t'];
      const signatureHash = headerValues['sha256'];
      if (typeof signatureTimestamp === 'undefined' || typeof signatureHash === 'undefined') {
        throw new Error('Invalid Signature header');
      }

      const toBeSignedPayload = signatureTimestamp + '.' + requestBody
      const expected = crypto.createHmac('sha256', secret).update(toBeSignedPayload).digest("hex");

      // Checks
      const currentTimestamp = (new Date).getTime() / 1000; // In seconds
      console.log('Timestamp age (seconds):', Math.floor(currentTimestamp - signatureTimestamp));
      console.log('Timestamp is recent enough:', currentTimestamp - signatureTimestamp <= maxAllowedTimestampSeconds);
      console.log('Hash is valid:', expected === signatureHash);
      ```
    </details>

    <details>
      <summary><strong>PHP</strong></summary>

      ```php
      // Variables you must get by yourself
      $secret = 'YOUR_ACCOUNT_SECRET';
      $requestBody = 'THE_HTTP_REQUEST_RAW_BODY';
      $signatureHeader = "t=1739352941,sha256=f51f716227106db033b792ca240323c77d673b5640ba8588077f939566c676ac";

      // Values you can configure
      $maxAllowedTimestampSeconds = 10 * 60; // a 10 minutes old timestamp is okay

      // Header parsing
      $headerValues = [];
      foreach (explode(',', $signatureHeader) as $part) {
          $keyValue = explode('=', trim($part));
          $headerValues[$keyValue[0]] = trim($keyValue[1]);
      }

      $signatureTimestamp = $headerValues['t'];
      $signatureHash = $headerValues['sha256'];
      if (!isset($headerValues['t'], $headerValues['sha256'])) {
          throw new \InvalidArgumentException('Invalid Signature header');
      }

      $toBeSignedPayload = sprintf("%s.%s", $signatureTimestamp, $requestBody);
      $expected = hash_hmac('sha256', $toBeSignedPayload, $secret);

      // Checks
      $currentTimestamp = time(); // In seconds
      echo 'Timestamp age (seconds): ' . floor($currentTimestamp - $signatureTimestamp) . "\n";
      echo 'Timestamp is recent enough: ' . ($currentTimestamp - $signatureTimestamp <= $maxAllowedTimestampSeconds ? 'true' : 'false') . "\n";
      echo 'Hash is valid: ' . ($expected === $signatureHash ? 'true' : 'false') . "\n";
      ```
    </details>

    ### Debug webhook integrations

    You can find the list of sent callback's HTTP requests & responses in your dashboard: `Applications and integrations > Callback History`

