  /accounts/{accountId}/requests/{requestId}/create_refund:
    post:
      summary: Create a refund for a request operation
      description: Create a Refund on an *Operation* by setting the Amount to Refund on the desired **Operation** (Deposit, No-Show, Payment). You must consider
        setting an Amount that is inferior or equal to the refundableAmount of the **Operation**. This information is available in the Retrieve a Requests endpoint.
        While the **Refund** is in progress, you can access the details per **operations** from the refundSummary of the Retrieve a Request endpoint.

        When all refunds will be successfully finished, the request's `callbacks.allPendingRefundsCompleted` url will be called with the updated request.
      tags:
        - requests
        - refunds
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: requestId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target
                - amount
                - reason
              properties:
                target:
                  type: string
                  enum: [ deposit, noShow, payment ]
                amount:
                  allOf:
                    - $ref: '#/components/schemas/Amount'
                    - description: The amount to refund. Must be inferior or equal to the refundableAmount
                reason:
                  type: string
                  description: The reason for the refund.
      responses:
        '200':
          description: The updated request with the refund informations
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: '#/components/schemas/Request'

