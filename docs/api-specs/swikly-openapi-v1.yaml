                    items:
                      $ref: '#/components/schemas/Reclaim'
                  meta:
                    $ref: '#/components/schemas/ResultsMeta'

  /accounts/{accountId}/requests/{requestId}/create_reclaim:
    post:
      summary: Create a reclaim for a request's deposit or noShow.
      description: Create a **Reclaim** on an *Operation* by setting the Amount to Reclaim on the desired **Operation** (Deposit, No-Show). For unscheduled reclaims, you must consider
        setting an Amount that is inferior or equal to the reclaimableAmount of the **Operation**. For scheduled reclaims, you must compare to the **schedulableReclaimAmount**. This information is available in the `Retrieve a Requests` endpoint.

        When the Reclaim will be successfully completed, and if there is no other pending Reclaim-related operations,
        the Request's `callbacks.allPendingReclaimsCompleted` url will be called with the updated Request.
      tags:
        - requests
        - reclaims
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: requestId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target
                - amount
                - reason
              properties:
                target:
                  type: string
                  enum: [ deposit, noShow ]
                amount:
                  allOf:
                    - $ref: '#/components/schemas/Amount'
                    - description: The amount to reclaim. Must be inferior or equal to the reclaimableAmount
                reason:
                  type: string
                  description: The reason for the reclaim.
                files:
                  type: array
                  description: The temporary file ids to attach to the reclaim. Files must have been uploaded with the [/files](#post-/accounts/-accountId-/files) endpoint.
                  items:
                    $ref: '#/components/schemas/Id'
                scheduledAt:
                  allOf:
                    - $ref: '#/components/schemas/Date'
                    - description: The date when the reclaim's collection plan will be initiated. If provided, the reclaim is created with SCHEDULED status and the collection process will automatically begin on this date. If omitted, the reclaim is created with PENDING status and requires manual initiation. The date must be later than today and sooner than `maximumReclaimCreationDate`.
      responses:
        '200':
          description: The updated request with the reclaim informations
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: '#/components/schemas/Request'

  /accounts/{accountId}/requests/{requestId}/cancel_reclaim:
    post:
      summary: Cancel a reclaim for a request's deposit or noShow.
      description: This will cancel all in progress **Reclaims** from an **Operation**.
        Additionally, if **Reclaims** are in **Scheduled** status, they will be automatically deleted if their associated **Operation** is still in **Pending** status.
        If the Request contains a Deposit and a No-Show with cancelable Reclaims, you must cancel them by running 2 calls.
        The cancelableAmount available in the reclaimSummary must be superior to 0 in order to cancel **Reclaims** of an **Operation**.
      tags:
        - requests
        - reclaims
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: requestId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - target
              properties:
                target:
                  type: string
                  enum: [ deposit, noShow ]
      responses:
        '200':
          description: The updated request with the reclaim informations
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  request:
                    $ref: '#/components/schemas/Request'

  /accounts/{accountId}/requests/{requestId}/reclaims:
    get:
      summary: List a request reclaims
      tags:
        - _advanced reclaims
        - _advanced requests
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: requestId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: query
          name: with
          description: load additional relationships, comma separated values
          required: false
          style: simple
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [ 'files' ]
      responses:
        '200':
          description: A list of reclaims
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  reclaims:
                    type: array
                    items:
                      $ref: '#/components/schemas/Reclaim'

  /accounts/{accountId}/reclaims/{reclaimId}:
    get:
      summary: Retrieve a reclaim
      tags:
        - _advanced reclaims
      operationId: getReclaim
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: reclaimId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: query
          name: with
          description: load additional relationships, comma separated values
          required: false
          style: simple
          explode: false
          schema:
            type: array
            items:
              type: string
              enum: [ files ]
      responses:
        '200':
          description: A reclaim
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
            swikly-account-trade-name:
              $ref: '#/components/headers/swikly-account-trade-name'
            swikly-account-currency:
              $ref: '#/components/headers/swikly-account-currency'
          content:
            application/json:
              schema:
                type: object
                properties:
                  reclaim:
                    $ref: '#/components/schemas/Reclaim'
    delete:
      summary: Delete a scheduled reclaim
      tags:
        - _advanced reclaims
      operationId: deleteReclaim
      parameters:
        - in: path
          name: accountId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
        - in: path
          name: reclaimId
          schema:
            $ref: '#/components/schemas/Id'
          required: true
      responses:
        '204':
          description: Reclaim deleted successfully
          headers:
            swikly-account-id:
              $ref: '#/components/headers/swikly-account-id'
        '400':
          description: Reclaim is not in a scheduled status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Only scheduled reclaims can be deleted."
                  error_code:
                    type: string
                    example: "ERR_DELETION_OF_NON_SCHEDULED_RECLAIM"

  /accounts/{accountId}/deposits/{depositId}/reclaims:
    post:
