    BaseReclaim:
      type: object
      required:
        - id
        - amount
        - cashedInAmount
        - reason
        - filesValidated
        - guaranteedAmount
        - createdAt
        - finishedAt
        - scheduledAt
      properties:
        id:
          $ref: '#/components/schemas/Id'
        reclaimableType:
          type: string
          enum:
            - Deposit
            - NoShow
        reclaimableId:
          $ref: '#/components/schemas/Id'
        amount:
          $ref: '#/components/schemas/Amount'
        cashedInAmount:
          $ref: '#/components/schemas/Amount'
        reason:
          type: string
          examples:
            - Broken chair
        files:
          type: array
          items:
            $ref: '#/components/schemas/File'
        filesValidated:
          type: boolean
        guaranteedAmount:
          readOnly: true
          oneOf:
            - $ref: '#/components/schemas/Amount'
            - type: 'null'
          description: "Amount in cents if guaranteed, else null"
        createdAt:
          $ref: '#/components/schemas/DateTime'
        finishedAt:
          $ref: '#/components/schemas/DateTimeOrNull'
        scheduledAt:
          $ref: '#/components/schemas/DateOrNull'

    InitializedReclaim:
      allOf:
        - $ref: '#/components/schemas/BaseReclaim'
        - type: object
          required:
            - status
            - finishedAt
          properties:
            status:
              type: string
              enum:
                - Initialized
            finishedAt:
              $ref: '#/components/schemas/DateTimeOrNull'
    FinishedReclaim:
      allOf:
        - $ref: '#/components/schemas/BaseReclaim'
        - type: object
          required:
            - status
            - finishedAt
          properties:
            status:
              type: string
              enum:
                - Finished
            finishedAt:
              $ref: '#/components/schemas/DateTime'
    ScheduledReclaim:
      allOf:
        - $ref: '#/components/schemas/BaseReclaim'
        - type: object
          required:
            - status
            - scheduledAt
          properties:
            status:
              type: string
              enum:
                - Scheduled
            scheduledAt:
              $ref: '#/components/schemas/Date'

    Reclaim:
      oneOf:
        - $ref: '#/components/schemas/InitializedReclaim'
        - $ref: '#/components/schemas/FinishedReclaim'
        - $ref: '#/components/schemas/ScheduledReclaim'

    ReclaimSummary:
      type: object
      required:
        - reclaimableAmount
        - scheduledRequestedAmount
        - maximumReclaimCreationDate
        - pendingRequestedAmount
        - pendingReclaimedAmount
        - reclaimedAmount
        - estimatedFinishDate
        - cancelableAmount
        - schedulableReclaimAmount
      properties:
        reclaimableAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: |
                The remaining amount in cents that can still be reclaimed for this
                operation. It is computed from the secured amount, subtracting:
                - the total of requested amounts for pending reclaims,
                - the total of requested amounts for pending debt-collection flows,
                - the total of requested amounts for scheduled reclaims,
                - the total amount already reclaimed from finished reclaims,
                - the total amount recovered through successful debt-collection
                flows. The value is never negative.
        scheduledRequestedAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: The total amount of scheduled reclaims in cents for this operation.
        maximumReclaimCreationDate:
          allOf:
            - $ref: '#/components/schemas/Date'
            - readOnly: true
            - description: The maximum date to create a reclaim for this operation. You won't be able to create reclaim after this date.
        pendingRequestedAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: The total amount of security deposits requested for reclaim, currently in progress for this operation, in cents. This represents the sum of the amounts you have requested to reclaim, which are still being processed
        pendingReclaimedAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: The total amount of ongoing reclaims for which funds have already been recovered for this operation, in cents. This represents the funds Swikly has already reclaimed but which are not yet fully completed.
        reclaimedAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: The total amount reclaimed from completed reclaims for this operation, in cents.
        estimatedFinishDate:
          allOf:
            - $ref: '#/components/schemas/DateOrNull'
            - readOnly: true
            - description: The estimated finish date of reclaims for this operation.
        cancelableAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: |
                Cancelable reclaim amount in cents for this operation.
                This is the remaining part of requested amounts (pending reclaims and debt collections), minus what has already been recovered, plus amounts from scheduled reclaims.
        irrecoverableAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: Unreclaimable amounts from completed reclaims in cents for this operation. This property will only be present if the API User has the Read Recovery permission
        schedulableReclaimAmount:
          allOf:
            - $ref: '#/components/schemas/Amount'
            - readOnly: true
            - description: |
                The remaining amount in cents that can still be scheduled for reclaim.
                For non-secured operations, this is the operation amount minus the total of scheduled reclaims.
                For secured operations that are still active, this equals `reclaimableAmount`.
                For operations in an inactive status (canceled, expired, expired-without-acceptance or released), this amount is always 0.
        irrecoverabilityCertificates:
          type: array
          items:
            $ref: '#/components/schemas/File'
          readOnly: true
          description: List of download links for Certificates of Irrecoverability. This property will only be present if the API User has the Read Recovery permission

