name: Deploy Preview

on:
  pull_request:
    branches: [main, develop]

jobs:
  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build --workspace=@brickshare/web
      
      - name: Deploy to Vercel
        id: vercel
        uses: vercel/action@master
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
      
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        if: steps.vercel.outputs.preview-url
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Preview Deploy Ready!**\n\n✅ [View Preview](${process.env.PREVIEW_URL})\n\n- **Commit**: ${context.sha.slice(0, 7)}\n- **Branch**: ${context.ref}\n- **Deploy Status**: Success`
            })
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.preview-url }}
      
      - name: Run smoke tests on preview
        if: steps.vercel.outputs.preview-url
        run: |
          echo "🧪 Running smoke tests on preview..."
          curl -f ${{ steps.vercel.outputs.preview-url }} || exit 1
          echo "✅ Preview is accessible"